name: Validate Main PR Source

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - ready_for_review

jobs:
  validate_source:
    runs-on: windows-latest

    steps:
      - name: Validate source branch
        shell: pwsh
        run: |
          if ("${{ github.head_ref }}" -ne "develop") {
            Write-Error "main solo acepta Pull Requests desde develop."
            exit 1
          }
